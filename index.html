<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ak Minta Maaf Ya mbaa🙏</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Menghilangkan highlight biru saat tombol diklik di HP */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0004ff, #004cff, #a882ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(230, 71, 116, 0.2);
            width: 100%;
            max-width: 360px; /* Pas untuk ukuran rata-rata layar HP */
            position: relative;
        }

        /* Area Ilustrasi Gambar */
        .image-container {
            width: 140px; /* Diperbesar sedikit agar fotomu kelihatan jelas */
            height: 140px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .foto-display {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Memastikan foto tidak gepeng/distorsi */
            border-radius: 20px; /* Membuat sudut foto melengkung halus */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            color: #003cff;
            margin-bottom: 12px;
            font-size: 22px;
            font-weight: 700;
        }

        p {
            color: #4f5d75;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .btn-group {
            position: relative;
            height: 55px;
            width: 100%;
        }

        button {
            padding: 14px 0;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: absolute;
            width: 45%; /* Ukuran tombol pas untuk jempol di HP */
        }

        #btn-maaf {
            background-color: #2ec4b6;
            color: white;
            left: 5%;
        }

        #btn-ga {
            background-color: #ff4d6d;
            color: white;
            right: 5%;
            /* Supaya transisi perpindahan di HP terlihat smooth */
            transition: left 0.1s ease, top 0.1s ease; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-container" id="box-gambar">
            <img class="foto-display" id="foto-kondisi" src="maaff.jpeg" alt="Foto Minta Maaf">
        </div>
        
        <h1 id="headline">ak minta maaf yaaa🙏</h1>
        <p id="pesan">maafin ak karena bikin kit heart yaaa, tolong dimaafin dengan ikhlas yaa? janji gak bakal diulangin lagi deh, ak di maafin kannn?</p>
        
        <div class="btn-group">
            <button id="btn-maaf" onclick="dimaafkan()">Maafin</button>
            <button id="btn-ga" onmouseover="hindari()" ontouchstart="hindari()" onclick="hindari()">Gak mau maafin wlee</button>
        </div>
    </div>

    <script>
        const btnGa = document.getElementById('btn-ga');
        const headline = document.getElementById('headline');
        const pesan = document.getElementById('pesan');
        const fotoKondisi = document.getElementById('foto-kondisi');
        const btnMaaf = document.getElementById('btn-maaf');

        function hindari() {
            const lebarLayan = window.innerWidth;
            const tinggiLayar = window.innerHeight;

            const x = Math.random() * (lebarLayan - btnGa.offsetWidth - 30) + 15;
            const y = Math.random() * (tinggiLayar - btnGa.offsetHeight - 30) + 15;
            
            btnGa.style.position = 'fixed';
            btnGa.style.left = x + 'px';
            btnGa.style.top = y + 'px';
            btnGa.style.right = 'auto';
        }

        function dimaafkan() {
            headline.innerHTML = "Makasih udah dimaafin!😊 ";
            pesan.innerHTML = "Yesss! Makasih yaaa udah dimaafin, km emang yang paling baik dan penyabar dehh 😆";
        
            fotoKondisi.src = "makasih.jpeg";
            
            btnGa.style.display = 'none';
            
            btnMaaf.style.position = 'static';
            btnMaaf.style.width = '100%';
            btnMaaf.innerHTML = "Kirim Pesan Ke Aku 💬";
            
            btnMaaf.onclick = function() {
                window.location.href = "https://wa.me/6285934748169";
            };
        }
    </script>
</body>
</html>
